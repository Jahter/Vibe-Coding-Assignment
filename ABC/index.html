<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC Logistics — Control Centre</title>
    <meta name="description" content="Inventory management control centre for ABC Logistics.">
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="app-background"></div>

    <nav class="navbar animate-slide-down">
        <div class="logo">
            <div class="logo-icon-wrapper">
                <span class="logo-icon"></span>
            </div>
            <h1>ABC Logistics</h1>
        </div>
        <ul class="nav-links">
            <li><a href="index.html" class="active"><i class="ph ph-squares-four"></i> Control Centre</a></li>
            <li><a href="about.html"><i class="ph ph-user"></i> About</a></li>
            <li>
                <div class="theme-toggle">
                    <button class="icon-btn"><i class="ph ph-moon"></i></button>
                </div>
            </li>
        </ul>
    </nav>

    <main class="dashboard-container">
        <header class="dashboard-header animate-fade-in stagger-1">
            <div class="header-content">
                <h2>Inventory Control Centre</h2>
                <p>Add, monitor, and manage warehouse inventory in real time with precision.</p>
            </div>
        </header>

        <div class="dashboard-grid">
            <!-- Form -->
            <section class="glass-panel input-section animate-fade-in-up stagger-2">
                <div class="panel-header">
                    <div class="panel-icon"><i class="ph ph-plus"></i></div>
                    <h3>Add New Item</h3>
                </div>
                <form id="inventory-form">
                    <div class="form-group">
                        <label for="item-name">Item Name</label>
                        <div class="input-wrapper">
                            <i class="ph ph-package input-icon"></i>
                            <input type="text" id="item-name" placeholder="e.g. Shipping Boxes" required
                                autocomplete="off">
                        </div>
                        <span class="error-msg" id="name-error"></span>
                    </div>
                    <div class="form-group grid-2">
                        <div>
                            <label for="item-quantity">Quantity</label>
                            <div class="input-wrapper">
                                <i class="ph ph-hash input-icon"></i>
                                <input type="number" id="item-quantity" placeholder="0" min="0" required>
                            </div>
                            <span class="error-msg" id="quantity-error"></span>
                        </div>
                        <div>
                            <label for="item-price">Unit Price</label>
                            <div class="input-wrapper">
                                <i class="ph ph-currency-dollar input-icon"></i>
                                <input type="number" id="item-price" placeholder="0.00" min="0" step="0.01" required>
                            </div>
                            <span class="error-msg" id="price-error"></span>
                        </div>
                    </div>
                    <div class="form-actions mt-4">
                        <button type="submit" class="btn btn-primary btn-glow" id="add-btn">
                            <span>Add to Inventory</span>
                            <i class="ph ph-arrow-right"></i>
                        </button>
                    </div>
                </form>
            </section>

            <!-- Chart -->
            <section class="glass-panel chart-section animate-fade-in-up stagger-3">
                <div class="section-header">
                    <div class="d-flex align-center gap-2">
                        <div class="panel-icon"><i class="ph ph-chart-bar"></i></div>
                        <h3 id="chart-title">Quantity Overview</h3>
                    </div>
                    <div class="toggle-group switcher">
                        <button id="toggle-qty" class="toggle-btn active"
                            onclick="setChartMode('quantity')">Qty</button>
                        <button id="toggle-val" class="toggle-btn" onclick="setChartMode('value')">Value</button>
                        <div class="switcher-bg"></div>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="inventoryChart"></canvas>
                </div>
            </section>

            <!-- List -->
            <section class="glass-panel list-section animate-fade-in-up stagger-4">
                <div class="section-header">
                    <div class="d-flex align-center gap-2">
                        <div class="panel-icon"><i class="ph ph-list-dashes"></i></div>
                        <h3>Current Inventory</h3>
                    </div>
                    <button id="clear-all-btn" class="btn btn-outline-danger btn-sm">
                        <i class="ph ph-trash"></i> <span>Clear All</span>
                    </button>
                </div>
                <div class="table-container">
                    <table class="inventory-table">
                        <thead>
                            <tr>
                                <th>Item Name</th>
                                <th class="text-right">Quantity</th>
                                <th class="text-right">Total Value</th>
                                <th class="text-center" style="width: 80px;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-list">
                            <!-- Items injected via JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
